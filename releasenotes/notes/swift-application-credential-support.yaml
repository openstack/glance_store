---
features:
  - |
    The Swift store driver now supports authentication using Keystone
    application credentials in addition to password-based authentication.
    This enables Zero Downtime Password Rotation (ZDPR) support for Swift
    backend operations, as application credentials are not affected by
    password rotation.

    Application credentials can be configured via direct configuration
    options (``swift_store_application_credential_id`` and
    ``swift_store_application_credential_secret``) or in the Swift
    backend configuration file using ``application_credential_id`` and
    ``application_credential_secret`` parameters.

    The implementation maintains backward compatibility - if application
    credentials are not provided, the driver falls back to password
    authentication. Application credentials are supported for both
    single-tenant and multi-tenant Swift storage configurations.
