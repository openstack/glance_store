---
features:
  - |
    Added application credential support to the Cinder backend driver.
    The Cinder backend now supports authentication using application
    credentials in addition to password authentication. This enables
    Zero Downtime Password Rotation (ZDPR) support for Glance
    deployments using Cinder as the image backend.

    Two new configuration options have been added:
    ``cinder_store_application_credential_id`` and
    ``cinder_store_application_credential_secret``. These options
    are available in both the ``[cinder]`` and ``[backend_defaults]``
    configuration groups. When both application credential options
    are set, the driver will use application credential authentication
    instead of password authentication. If either option is not set,
    the driver falls back to password authentication for backward
    compatibility.

    This feature allows operators to rotate service user passwords
    without downtime, as application credentials can be created with
    overlapping validity periods.